services:
  - type: web
    name: bni-japan-chat
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: HOST_EMAIL
        sync: false
      - key: HOST_PASSWORD
        sync: false
